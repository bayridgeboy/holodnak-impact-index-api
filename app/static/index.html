<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HII</title>
  <style>
    :root { --b:#e7e7e7; --m:#666; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #fafafa; }
    .wrap { max-width: 980px; margin: 28px auto; padding: 0 16px; }
    .topbar { display:flex; justify-content:space-between; align-items:flex-end; gap: 12px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 28px; letter-spacing: -0.3px; }
    .sub { color: var(--m); margin-top: 6px; }

    .panel { background:#fff; border:1px solid var(--b); border-radius: 14px; padding: 14px; }
    .panel + .panel { margin-top: 12px; }

    .controls { display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
    .controls input[type="text"] { padding: 10px 10px; border:1px solid var(--b); border-radius: 10px; }
    .btn { padding: 10px 14px; border:1px solid #111; background:#111; color:#fff; border-radius: 12px; cursor:pointer; }
    .btn.secondary { background:#fff; color:#111; }

    textarea { width: 100%; height: 90px; padding: 12px; border:1px solid var(--b); border-radius: 14px; resize: vertical; font-size: 14px; }
    .hint { color: var(--m); font-size: 13px; margin-top: 8px; display:flex; justify-content:space-between; gap: 12px; flex-wrap: wrap; }

    .status { color:#111; }
    .status.error { color:#b00020; }

    .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
    .card { border:1px solid var(--b); background:#fff; border-radius: 16px; padding: 14px; }
    .name { font-weight: 800; font-size: 18px; margin-bottom: 6px; }
    .pill { display:inline-block; padding: 3px 10px; border:1px solid var(--b); border-radius: 999px; font-size: 12px; margin-right: 6px; color:#222; background:#fff; }
    .score { font-size: 40px; font-weight: 900; margin: 8px 0 2px; letter-spacing: -0.6px; }
    ul { margin: 6px 0 0 18px; padding: 0; }
    li { margin: 3px 0; }

    .clarify { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ddd; }
    .row { display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
    .clarify input { padding: 10px; border:1px solid var(--b); border-radius: 10px; flex: 1; min-width: 260px; }

    .alts { margin-top: 10px; }
    .alt { border:1px solid var(--b); border-radius: 12px; padding: 10px; margin-top: 8px; background:#fff; }
    .alt .t { font-weight: 700; }
    .alt .s { color: var(--m); font-size: 13px; margin-top: 4px; }

    details { margin-top: 10px; }
    pre { overflow:auto; background:#0b0b0b; color:#f2f2f2; padding: 12px; border-radius: 12px; border: 1px solid #222; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>HII</h1>
        <div class="sub">Card first. Corrections optional.</div>
      </div>

      <div class="controls">
        <label>Rubric <input id="rubric" type="text" value="impact_v1" /></label>
        <button id="go" class="btn">Generate</button>
        <button id="demo" class="btn secondary">Demo</button>
      </div>
    </div>

    <div class="panel" style="margin-top:14px;">
      <textarea id="names" placeholder="Alexander Belikoff"></textarea>
      <div class="hint">
        <div>Comma or newline separated. Max 3.</div>
        <div>Industry · Impact · Totem · Fun + alternates</div>
      </div>
    </div>

    <div id="statusPanel" class="panel" style="display:none;">
      <div id="status" class="status"></div>
    </div>

    <div id="resultsPanel" class="panel" style="display:none;">
      <div id="cards" class="cards"></div>

      <details>
        <summary>Debug JSON (last response)</summary>
        <pre id="debug"></pre>
      </details>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  const state = { people: [], lastResponse: null };

  function parseNames(text) {
    return text
      .split(/[\n,]+/)
      .map(s => s.trim())
      .filter(Boolean)
      .slice(0, 3);
  }

  function show(el, on=true) { el.style.display = on ? "block" : "none"; }

  function setStatus(msg, isError=false) {
    show($("statusPanel"), true);
    const el = $("status");
    el.textContent = msg;
    el.className = "status" + (isError ? " error" : "");
  }

  async function postHii() {
    const payload = {
      people: state.people,
      rubric_version: $("rubric").value || "impact_v1",
      refresh: false
    };

    setStatus("Calling /hii …");
    const res = await fetch("/hii", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = { status: "bad_json", raw: text }; }

    state.lastResponse = data;
    $("debug").textContent = JSON.stringify(data, null, 2);
    show($("resultsPanel"), true);

    if (!res.ok || data.status !== "ok") {
      setStatus(`Backend error / unexpected response (see Debug JSON)`, true);
      return;
    }

    setStatus("OK ✅");
    renderCards(data.cards || []);
  }

  function renderCards(cards) {
    const wrap = $("cards");
    wrap.innerHTML = "";

    // keep stable people list for rescore
    state.people = cards.map(c => ({
      name: c.name,
      person_id: c.person_id
    }));

    cards.forEach((c, idx) => {
      const funny = (c.funny || []).slice(0, 2).map(x => `<li>${escapeHtml(x)}</li>`).join("");
      const defense = (c.defense || []).slice(0, 3).map(x => `<li>${escapeHtml(x)}</li>`).join("");

      const src = (c.sources || []).slice(0,3).map(s =>
        `<li><a href="${escapeAttr(s.url)}" target="_blank" rel="noreferrer">${escapeHtml(s.title || s.url)}</a></li>`
      ).join("");

      const alts = (c.alternates || []).slice(0,3).map((a, j) => `
        <div class="alt">
          <label class="row" style="gap:8px; align-items:flex-start;">
            <input type="radio" name="alt_${idx}" value="${escapeAttr(a.url)}" ${j===0 ? "checked" : ""}/>
            <div>
              <div class="t">${escapeHtml(a.display || a.url)}</div>
              ${a.snippet ? `<div class="s">${escapeHtml(a.snippet)}</div>` : ""}
              <div class="s"><a href="${escapeAttr(a.url)}" target="_blank" rel="noreferrer">${escapeHtml(a.url)}</a></div>
            </div>
          </label>
        </div>
      `).join("");

      const el = document.createElement("div");
      el.className = "card";
      el.innerHTML = `
        <div class="name">${escapeHtml(c.name || "")}</div>
        <div><span class="pill">Industry</span>${escapeHtml(c.industry || "")}</div>
        <div class="score">${Number(c.industry_impact ?? 0)}/100</div>
        <div><span class="pill">Totem</span>${escapeHtml(c.totem || "")}</div>

        ${funny ? `<div style="margin-top:10px;"><b>Fun</b><ul>${funny}</ul></div>` : ""}
        ${defense ? `<div style="margin-top:10px;"><b>Defense</b><ul>${defense}</ul></div>` : ""}
        <div style="margin-top:10px; color:#666;">Confidence: ${escapeHtml(c.confidence || "")}</div>

        ${src ? `<div style="margin-top:10px;"><b>Sources</b><ul>${src}</ul></div>` : ""}

        <div class="clarify">
          <div><b>${escapeHtml(c.clarify_question || ("If you meant a different " + (c.name||"person") + ", pick another match or paste one line."))}</b></div>

          <div class="alts">
            <div style="margin-top:10px;"><b>Top matches</b></div>
            ${alts || `<div class="s" style="margin-top:8px;">(No alternates returned)</div>`}
          </div>

          <div class="row" style="margin-top:12px;">
            <input id="desc_${idx}" type="text" placeholder="One line: role/domain/company (optional)" />
            <button class="btn" id="rescore_${idx}">Rescore</button>
          </div>
        </div>
      `;
      wrap.appendChild(el);

      el.querySelector(`#rescore_${idx}`).onclick = async () => {
        const desc = el.querySelector(`#desc_${idx}`).value.trim();
        const pickedUrl = el.querySelector(`input[name="alt_${idx}"]:checked`)?.value;

        state.people[idx].description = desc || null;
        state.people[idx].selected_url = pickedUrl || null;

        await postHii();
      };
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
  function escapeAttr(s) {
    return String(s).replaceAll('"', "&quot;").replaceAll("'", "&#039;");
  }

  $("go").onclick = async () => {
    const names = parseNames($("names").value);
    if (names.length === 0) {
      setStatus("Enter at least one name.", true);
      show($("resultsPanel"), true);
      return;
    }

    state.people = names.map(n => ({ name: n }));
    show($("resultsPanel"), true);
    await postHii();
  };

  $("demo").onclick = () => {
    $("names").value = "Alexander Belikoff";
  };
})();
</script>
</body>
</html>
